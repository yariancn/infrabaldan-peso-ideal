<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infra Baldan - Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">

  <h1 class="text-4xl font-bold text-center mb-8">Infra Baldan - Prueba</h1>

  <button onclick="nuevoCliente()" 
          class="bg-black text-white px-6 py-3 rounded-2xl text-lg mx-auto block">
    + Nuevo Cliente
  </button>

  <!-- Modal simple de prueba -->
  <div id="modalCliente" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl w-full max-w-md mx-4 p-8">
      <h2 class="text-2xl font-bold mb-6">Nuevo Cliente - Prueba</h2>
      <p class="mb-6">Si ves este mensaje, el modal funciona.</p>
      <button onclick="cerrarModal()" 
              class="bg-black text-white px-6 py-3 rounded-2xl w-full">
        Cerrar
      </button>
    </div>
  </div>

<script>
  function nuevoCliente() {
    document.getElementById('modalCliente').classList.remove('hidden');
  }

  function cerrarModal() {
    document.getElementById('modalCliente').classList.add('hidden');
  }
</script>
</body>
</html>
