<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infra Baldan - Oxy Hyperbaric</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style> 
    body { font-family: system-ui; } 
    .card-hover:hover { transform: translateY(-2px); }
  </style>
</head>
<body class="bg-gray-50">

<div class="max-w-6xl mx-auto p-6">
  <div class="flex flex-col items-center mb-8">
    <img src="logo.jpg" alt="Oxy Hyperbaric" class="h-20 mb-4">
    <h1 class="text-4xl font-bold text-center text-black">Infra Baldan</h1>
    <p class="text-gray-500">Seguimiento de Peso y Composición Corporal</p>
  </div>

  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
    <button onclick="nuevoCliente()" class="bg-black text-white px-6 py-3 rounded-2xl hover:bg-gray-800 flex items-center gap-2">
      <span>+</span> Nuevo Cliente
    </button>

    <div class="flex gap-3 w-full sm:w-auto">
      <input id="buscar" type="text" placeholder="Buscar cliente..." onkeyup="renderLista()" 
             class="flex-1 px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-black">
      <button onclick="toggleUnidades()" id="btnUnidades" class="bg-white border border-gray-300 px-5 py-3 rounded-2xl text-sm font-medium">
        Unidades: <span id="unidadActual">kg / cm</span>
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="listaClientes"></div>
</div>

<!-- Modal Detalle Mejorado -->
<div id="modalDetalle" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl w-full max-w-3xl mx-4 p-6 max-h-[92vh] overflow-auto">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-bold" id="nombreDetalle"></h2>
      <button onclick="cerrarDetalle()" class="text-4xl leading-none text-gray-400 hover:text-black">×</button>
    </div>

    <div id="resumenCalculo" class="bg-gray-100 rounded-3xl p-6 mb-8"></div>

    <!-- Información de progreso -->
    <div class="grid grid-cols-2 gap-4 mb-8 text-sm">
      <div class="bg-white border rounded-2xl p-4">
        <div class="text-gray-500">Fecha de inicio</div>
        <div class="font-medium" id="fechaInicio"></div>
      </div>
      <div class="bg-white border rounded-2xl p-4">
        <div class="text-gray-500">Semanas transcurridas</div>
        <div class="font-medium" id="semanasTranscurridas"></div>
      </div>
    </div>

    <h3 class="font-semibold mb-4">Registrar Avance Semanal</h3>
    <div class="grid grid-cols-3 gap-4 mb-8">
      <input id="fechaAvance" type="date" class="px-4 py-3 border rounded-2xl">
      <input id="pesoAvance" type="number" step="0.1" placeholder="Peso" class="px-4 py-3 border rounded-2xl">
      <input id="grasaAvance" type="number" step="0.1" placeholder="% Grasa" class="px-4 py-3 border rounded-2xl">
      <button onclick="agregarAvance()" class="col-span-3 bg-black text-white py-4 rounded-2xl font-medium">Guardar Avance</button>
    </div>

    <canvas id="grafica" height="140"></canvas>

    <h3 class="font-semibold mt-10 mb-4">Historial de Avances</h3>
    <table class="w-full text-sm" id="tablaHistorial"></table>

    <button onclick="eliminarClienteActual()" class="mt-10 text-red-600 text-sm hover:underline">Eliminar este cliente</button>
  </div>
</div>

<script>
  let clientes = JSON.parse(localStorage.getItem('clientesBaldan')) || [];
  let clienteActual = null;
  let chartInstance = null;
  let usaLibras = false;

  function actualizarGrasaIdeal() {
    const sexo = document.getElementById('sexo').value;
    document.getElementById('grasaObjetivo').value = sexo === 'M' ? 15 : 22;
  }

  function calcularIdeal(c) {
    const peso = parseFloat(c.peso) || 0;
    const grasaActual = parseFloat(c.grasa) || 0;
    const grasaIdeal = parseFloat(c.grasaObjetivo) || (c.sexo === 'M' ? 15 : 22);

    const masaMagra = peso * (1 - grasaActual / 100);
    const pesoIdeal = masaMagra / (1 - grasaIdeal / 100);
    const kgBajar = Math.max(0, peso - pesoIdeal);
    const semanas = kgBajar > 0 ? Math.ceil(kgBajar) : 0;

    return { pesoIdeal: pesoIdeal.toFixed(1), kgBajar: kgBajar.toFixed(1), semanas, grasaIdeal };
  }

  function convertirPeso(pesoKg) {
    return usaLibras ? (pesoKg * 2.20462).toFixed(1) : parseFloat(pesoKg).toFixed(1);
  }

  function toggleUnidades() {
    usaLibras = !usaLibras;
    document.getElementById('unidadActual').textContent = usaLibras ? "lbs / inches" : "kg / cm";
    renderLista();
  }

  function renderLista() {
    const filtro = document.getElementById('buscar').value.toLowerCase().trim();
    const container = document.getElementById('listaClientes');
    container.innerHTML = '';

    const filtrados = clientes.filter(c => c.nombre.toLowerCase().includes(filtro));

    if (filtrados.length === 0 && filtro !== '') {
      container.innerHTML = `<p class="col-span-3 text-center text-gray-500 py-12">No se encontraron clientes</p>`;
      return;
    }

    filtrados.forEach((c) => {
      const calc = calcularIdeal(c);
      const pesoDisplay = convertirPeso(c.peso);
      const unidad = usaLibras ? "lbs" : "kg";

      const card = document.createElement('div');
      card.className = "bg-white rounded-3xl shadow p-6 cursor-pointer hover:shadow-xl card-hover transition";
      card.innerHTML = `
        <div class="font-semibold text-xl mb-1">${c.nombre}</div>
        <div class="text-gray-500 text-sm">${c.sexo} • ${c.edad} años</div>
        <div class="mt-6 space-y-3 text-sm">
          <div class="flex justify-between"><span class="text-gray-600">Peso actual</span><span class="font-medium">${pesoDisplay} ${unidad}</span></div>
          <div class="flex justify-between"><span class="text-gray-600">Grasa ideal</span><span class="font-medium text-blue-600">${calc.grasaIdeal}%</span></div>
          <div class="flex justify-between"><span class="text-gray-600">Peso ideal</span><span class="font-semibold">${convertirPeso(calc.pesoIdeal)} ${unidad}</span></div>
          <div class="bg-amber-100 text-amber-800 text-xs rounded-2xl px-4 py-3 mt-2">
            Bajar <strong>${convertirPeso(calc.kgBajar)} ${unidad}</strong> → ${calc.semanas} semanas
          </div>
        </div>
      `;
      card.onclick = () => verDetalle(clientes.indexOf(c));
      container.appendChild(card);
    });
  }

  function nuevoCliente() {
    clienteActual = null;
    document.getElementById('modalTitulo').textContent = 'Nuevo Cliente';
    document.getElementById('nombre').value = '';
    document.getElementById('sexo').value = 'M';
    document.getElementById('edad').value = '';
    document.getElementById('altura').value = '';
    document.getElementById('peso').value = '';
    document.getElementById('grasa').value = '';
    actualizarGrasaIdeal();
    document.getElementById('modalCliente').classList.remove('hidden');
  }

  function guardarCliente() {
    const fechaInicio = new Date().toISOString().split('T')[0]; // Fecha de hoy

    const cliente = {
      nombre: document.getElementById('nombre').value.trim() || 'Sin nombre',
      sexo: document.getElementById('sexo').value,
      edad: parseFloat(document.getElementById('edad').value) || 30,
      altura: parseFloat(document.getElementById('altura').value) || 170,
      peso: parseFloat(document.getElementById('peso').value) || 80,
      grasa: parseFloat(document.getElementById('grasa').value) || 25,
      grasaObjetivo: parseFloat(document.getElementById('grasaObjetivo').value) || (document.getElementById('sexo').value === 'M' ? 15 : 22),
      fechaInicio: fechaInicio,
      avances: clienteActual ? clienteActual.avances : []
    };

    if (clienteActual !== null) {
      clientes[clienteActual.index] = cliente;
    } else {
      clientes.push(cliente);
    }

    localStorage.setItem('clientesBaldan', JSON.stringify(clientes));
    cerrarModal();
    renderLista();
  }

  function verDetalle(index) {
    clienteActual = { ...clientes[index], index };
    document.getElementById('nombreDetalle').textContent = clienteActual.nombre;

    const calc = calcularIdeal(clienteActual);
    const unidad = usaLibras ? "lbs" : "kg";

    // Fecha de inicio y semanas transcurridas
    const fechaInicio = clienteActual.fechaInicio || "Sin registrar";
    const semanasTrans = clienteActual.fechaInicio 
      ? Math.floor((new Date() - new Date(clienteActual.fechaInicio)) / (1000 * 60 * 60 * 24 * 7)) 
      : 0;

    document.getElementById('fechaInicio').textContent = fechaInicio;
    document.getElementById('semanasTranscurridas').textContent = `${semanasTrans} semanas`;

    document.getElementById('resumenCalculo').innerHTML = `
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
        <div><div class="text-xs text-gray-500">PESO ACTUAL</div><div class="text-3xl font-bold">${convertirPeso(clienteActual.peso)} ${unidad}</div></div>
        <div><div class="text-xs text-gray-500">GRASA ACTUAL</div><div class="text-3xl font-bold">${clienteActual.grasa}%</div></div>
        <div><div class="text-xs text-gray-500">GRASA IDEAL</div><div class="text-3xl font-bold text-blue-600">${calc.grasaIdeal}%</div></div>
        <div><div class="text-xs text-gray-500">PESO IDEAL</div><div class="text-3xl font-bold">${convertirPeso(calc.pesoIdeal)} ${unidad}</div></div>
      </div>
    `;

    document.getElementById('modalDetalle').classList.remove('hidden');
    renderHistorialYGrafica();
  }

  function renderHistorialYGrafica() {
    const tbody = document.getElementById('tablaHistorial');
    tbody.innerHTML = `<tr class="bg-gray-100"><th class="px-4 py-3 text-left">Fecha</th><th class="px-4 py-3 text-left">Peso</th><th class="px-4 py-3 text-left">% Grasa</th></tr>`;

    const fechas = [], pesos = [];

    // Agregar peso inicial como primer punto
    if (clienteActual.fechaInicio) {
      fechas.push(clienteActual.fechaInicio);
      pesos.push(clienteActual.peso);
    }

    (clienteActual.avances || []).forEach(a => {
      const row = document.createElement('tr');
      row.className = "border-b hover:bg-gray-50";
      row.innerHTML = `<td class="px-4 py-3">${a.fecha}</td><td class="px-4 py-3">${convertirPeso(a.peso)} ${usaLibras ? 'lbs' : 'kg'}</td><td class="px-4 py-3">${a.grasa}%</td>`;
      tbody.appendChild(row);
      fechas.push(a.fecha);
      pesos.push(a.peso);
    });

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(document.getElementById('grafica'), {
      type: 'line',
      data: {
        labels: fechas,
        datasets: [
          {
            label: 'Peso Real',
            data: pesos,
            borderColor: '#0ea5e9',
            tension: 0.3,
            pointBackgroundColor: '#0ea5e9'
          },
          {
            label: 'Peso Ideal',
            data: Array(fechas.length).fill(calcularIdeal(clienteActual).pesoIdeal),
            borderColor: '#10b981',
            borderDash: [5, 5],
            tension: 0
          }
        ]
      },
      options: {
        responsive: true,
        scales: { y: { beginAtZero: false } }
      }
    });
  }

  // Funciones restantes (agregarAvance, eliminar, cerrar, etc.)
  function agregarAvance() {
    if (!clienteActual) return;
    const fecha = document.getElementById('fechaAvance').value;
    const peso = parseFloat(document.getElementById('pesoAvance').value);
    const grasa = parseFloat(document.getElementById('grasaAvance').value);

    if (!fecha || !peso) return alert("Fecha y peso son obligatorios");

    if (!clienteActual.avances) clienteActual.avances = [];
    clienteActual.avances.unshift({ fecha, peso, grasa });
    clientes[clienteActual.index] = clienteActual;

    localStorage.setItem('clientesBaldan', JSON.stringify(clientes));
    renderHistorialYGrafica();
    document.getElementById('pesoAvance').value = '';
    document.getElementById('grasaAvance').value = '';
  }

  function eliminarClienteActual() {
    if (confirm("¿Eliminar este cliente y todo su historial?")) {
      clientes.splice(clienteActual.index, 1);
      localStorage.setItem('clientesBaldan', JSON.stringify(clientes));
      cerrarDetalle();
      renderLista();
    }
  }

  function cerrarModal() { document.getElementById('modalCliente').classList.add('hidden'); }
  function cerrarDetalle() { 
    document.getElementById('modalDetalle').classList.add('hidden'); 
    clienteActual = null; 
  }

  window.onload = () => renderLista();
</script>
</body>
</html>
