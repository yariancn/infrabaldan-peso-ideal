<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OXYHYPERBARIC INFRA BADAN 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #1e293b; font-size: 13px; }
        .predicta-card { background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .titan-btn { background: #1e293b; color: white; transition: all 0.2s; font-weight: 900; cursor: pointer; border: none; }
        .input-titan { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px 12px; width: 100%; outline: none; }
        #modalDetalle, #modalNuevo { z-index: 100; display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); }
        .modal-content { background: white; width: 90vw; max-width: 1100px; height: 85vh; margin: 7vh auto; border-radius: 35px; overflow-y: auto; position: relative; }
        .sticky-header { position: sticky; top: 0; background: white; z-index: 50; padding: 15px 30px; border-bottom: 1px solid #f1f5f9; }
        @media print {
            @page { size: auto; margin: 5mm; }
            .no-print, .unit-control, button, input { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            #modalDetalle { display: block !important; position: static !important; }
            .modal-content { width: 100% !important; max-width: none !important; margin: 0 !important; height: auto !important; border: none !important; padding: 0 !important; }
            canvas { max-width: 100% !important; height: 260px !important; }
        }
    </style>
</head>
<body class="antialiased p-4">

    <div class="fixed top-5 right-6 z-[110] no-print">
        <button onclick="toggleUnits(event)" id="btnUnits" class="bg-blue-600 text-white py-2 px-5 rounded-xl font-black text-[9px] shadow-lg uppercase border-2 border-white">
            SISTEMA: <span id="currentUnitText">KG / CM</span>
        </button>
    </div>

    <header class="flex flex-col items-center mb-6 no-print">
        <h1 class="text-2xl font-black uppercase italic text-gray-950">OXYHYPERBARIC INFRA BADAN 3.0</h1>
    </header>

    <main class="max-w-5xl mx-auto no-print">
        <div class="flex justify-between items-center mb-5 px-2">
            <button onclick="openNewClientModal()" class="titan-btn px-5 py-2.5 rounded-xl text-[9px] uppercase tracking-widest">+ NUEVO REGISTRO</button>
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 Buscar..." class="bg-white border-none rounded-xl px-4 py-2 text-sm w-72 shadow-sm ring-1 ring-gray-100">
        </div>
        <div class="predicta-card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-[8px] font-black uppercase text-gray-400 border-b italic">
                    <tr><th class="px-6 py-3">ID</th><th class="px-6 py-3">PACIENTE</th><th class="px-6 py-3 text-center">PERFIL</th><th class="px-6 py-3 text-center text-blue-600">PESO</th><th class="px-6 py-3 text-right">FICHA</th></tr>
                </thead>
                <tbody id="clientTableBody" class="divide-y divide-gray-50 font-medium text-sm italic"></tbody>
            </table>
        </div>
    </main>

    <div id="modalDetalle">
        <div class="modal-content">
            <div class="sticky-header flex justify-between items-center no-print">
                <button onclick="closeModal()" class="text-blue-600 font-black text-[9px] uppercase">← REGRESAR</button>
                <div class="flex gap-3">
                    <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[8px] font-black uppercase">🖨️ IMPRIMIR REPORTE</button>
                    <button onclick="closeModal()" class="text-gray-300 text-2xl">✕</button>
                </div>
            </div>

            <div class="px-10 py-5">
                <header class="flex justify-between items-start mb-6 border-b pb-6">
                    <div>
                        <h2 id="modalNombre" class="text-3xl font-black italic uppercase text-gray-950 leading-none">PACIENTE</h2>
                        <p id="modalInfo" class="text-[9px] font-bold text-gray-400 uppercase mt-1">--</p>
                    </div>
                    <div class="text-right">
                        <div class="bg-blue-600 text-white px-6 py-3 rounded-[20px] shadow-lg mb-1">
                            <p class="text-[8px] uppercase font-bold italic opacity-80">Peso Ideal Salud</p>
                            <p id="targetWeightDisplay" class="text-xl font-black italic">--</p>
                        </div>
                        <p id="prognosisBadge" class="text-[9px] font-black text-blue-600 uppercase italic">--</p>
                    </div>
                </header>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">
                    <div class="bg-gray-50 p-5 rounded-[25px] border border-gray-100"><p class="text-[9px] font-black text-gray-400 uppercase italic">Motor Metabólico (Masa Magra)</p><p id="muscleMass" class="text-2xl font-black text-slate-800">--</p></div>
                    <div class="bg-gray-50 p-5 rounded-[25px] border border-gray-100 text-center"><p class="text-[9px] font-black text-gray-400 uppercase italic">Grasa Visceral</p><p id="visceralFat" class="text-2xl font-black text-slate-800">--</p></div>
                    <div class="bg-gray-950 p-5 rounded-[25px] text-white text-center"><p class="text-[9px] font-black text-blue-400 uppercase italic">Gasto Basal (BMR)</p><p id="displayBMR" class="text-2xl font-black text-white">--</p></div>
                </div>

                <div class="predicta-card p-5 border-2 border-gray-50 mb-6 text-center">
                    <h3 class="text-[9px] font-black uppercase text-gray-400 tracking-widest mb-3 italic">RUTA HACIA EL PESO SALUDABLE (PRONÓSTICO CLÍNICO)</h3>
                    <div class="h-[250px] w-full"><canvas id="progressChart"></canvas></div>
                </div>

                <div class="bg-slate-50 p-6 rounded-[30px] no-print flex gap-4 items-end">
                    <div class="flex-1"><label class="text-[8px] font-bold uppercase mb-1 block">Peso Actual</label><input type="number" id="sessWeight" class="input-titan"></div>
                    <div class="flex-1"><label class="text-[8px] font-bold uppercase mb-1 block">% Grasa Wyze</label><input type="number" id="sessFat" class="input-titan"></div>
                    <button onclick="addSession()" class="titan-btn px-8 py-2.5 rounded-xl text-[9px] uppercase">ACTUALIZAR</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalNuevo">
        <div class="modal-content max-w-xl h-auto p-10 mt-[10vh]">
            <button onclick="closeNewClientModal()" class="absolute top-5 right-6 text-gray-300 text-xl">✕</button>
            <h2 class="text-xl font-black uppercase italic mb-6 border-l-4 border-blue-600 pl-3">Alta de Paciente</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="newID" class="input-titan" placeholder="ID Manual">
                <input type="text" id="newName" class="input-titan" placeholder="Nombre">
                <input type="number" id="newAge" class="input-titan" placeholder="Edad">
                <input type="number" id="newHeight" class="input-titan" placeholder="Altura">
                <select id="newGender" class="input-titan font-bold"><option value="Masculino">Masculino</option><option value="Femenino">Femenino</option></select>
                <input type="number" id="newWeight" class="input-titan" placeholder="Peso Inicial">
                <input type="number" id="newFat" class="input-titan" placeholder="% Grasa Actual">
            </div>
            <button onclick="saveNewClient()" class="w-full titan-btn py-3 rounded-xl mt-6 uppercase text-[10px]">Guardar</button>
        </div>
    </div>

<script>
    // URL ACTUALIZADA SEGÚN TU ÚLTIMO DEPLOYMENT
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxrmPULg5jGgI5VnZF66JYBhZS9CEN0CGAoZW8F2WWrRFJkmjKFrH7Kt5rnn0UXqfEU/exec";
    let unitMode = 'KG', chartInstance = null, globalData = [], currentPatient = null;

    async function fetchData() {
        try { const res = await fetch(`${WEB_APP_URL}?action=obtenerClientes`); globalData = await res.json(); renderTable(globalData); } catch (e) { console.error("Error de conexión:", e); }
    }

    function convP(val) { val = parseFloat(val); return unitMode === 'LB' ? (val * 2.20462).toFixed(1) : val.toFixed(1); }
    function convA(val) { val = parseFloat(val); return unitMode === 'LB' ? (val / 2.54).toFixed(1) + " IN" : val.toFixed(0) + " CM"; }

    // AJUSTE DE FÓRMULA SOLICITADO
    function getIdealFat(age, gender) {
        let base = gender === 'Masculino' ? 15 : 22;
        let adjustment = Math.max(0, Math.floor((age - 20) / 10) * 1.5);
        return (base + adjustment) / 100;
    }

    function renderTable(data) {
        const tbody = document.getElementById('clientTableBody'); tbody.innerHTML = '';
        data.forEach(p => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-blue-50 cursor-pointer border-b italic";
            tr.onclick = (e) => { if(e.target.id !== 'btnUnits' && e.target.parentElement.id !== 'btnUnits') selectPatient(p); };
            tr.innerHTML = `<td class="px-6 py-4 text-[8px] font-black text-gray-300 uppercase">${p.id}</td>
                <td class="px-6 py-4 font-black text-gray-900 uppercase italic text-xs">${p.nombre}</td>
                <td class="px-6 py-4 text-center text-[8px] text-gray-400 font-bold uppercase">${p.sexo} | ${p.edad} años | ${convA(p.altura)}</td>
                <td class="px-6 py-4 text-center font-black text-blue-600 italic text-sm">${convP(p.peso)} ${unitMode}</td>
                <td class="px-6 py-4 text-right text-blue-200">➔</td>`;
            tbody.appendChild(tr);
        });
    }

    function selectPatient(p) {
        currentPatient = p; document.getElementById('modalNombre').innerText = p.nombre;
        const dateObj = new Date(p.fechaInicio);
        document.getElementById('modalInfo').innerText = `${p.sexo} | ${p.edad} AÑOS | INICIO: ${dateObj.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase()}`;
        
        const pesoKG = parseFloat(p.peso), grasaActual = parseFloat(p.grasa) / 100, masaMagra = pesoKG * (1 - grasaActual);
        
        // CÁLCULO CIENTÍFICO AUTOMÁTICO
        const grasaObjetivo = getIdealFat(p.edad, p.sexo);
        const targetWeightKG = masaMagra / (1 - grasaObjetivo);
        const totalSesiones = Math.ceil((pesoKG - targetWeightKG) / 0.453);

        document.getElementById('targetWeightDisplay').innerText = `${convP(targetWeightKG)} ${unitMode}`;
        document.getElementById('prognosisBadge').innerText = `${totalSesiones} SESIONES | ${Math.ceil(totalSesiones/2)} SEMANAS PARA META`;
        document.getElementById('muscleMass').innerText = `${convP(masaMagra)} ${unitMode}`;
        document.getElementById('displayBMR').innerText = Math.round(370 + (21.6 * masaMagra));
        document.getElementById('visceralFat').innerText = p.visceral || "--";
        
        initChart(p, targetWeightKG);
        document.getElementById('modalDetalle').style.display = 'block'; document.body.style.overflow = 'hidden';
    }

    function initChart(p, targetKG) {
        const ctx = document.getElementById('progressChart').getContext('2d'); if(chartInstance) chartInstance.destroy();
        const pIni = parseFloat(p.peso), startPoint = parseFloat(convP(pIni)), targetPoint = parseFloat(convP(targetKG));
        const metaData = [startPoint], step = unitMode === 'KG' ? 0.453 : 1.0;
        const totalSteps = Math.max(Math.ceil((pIni - targetKG) / 0.453), 10);
        for(let i=1; i<=totalSteps; i++) { let nv = metaData[i-1] - step; metaData.push(nv > targetPoint ? nv.toFixed(1) : targetPoint.toFixed(1)); }
        const realData = [startPoint]; if(p.avances) { p.avances.sort((a,b) => new Date(a.fecha) - new Date(b.fecha)); p.avances.forEach(a => realData.push(parseFloat(convP(a.peso)))); }
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels: metaData.map((_, i) => `S${i+1}`), datasets: [{ label: 'REAL', data: realData, borderColor: '#2563eb', tension: 0.3, borderWidth: 5, pointRadius: 4, backgroundColor: '#2563eb' }, { label: 'META', data: metaData, borderColor: '#cbd5e1', borderDash: [5,5], tension: 0, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { font: { size: 8 } } }, x: { ticks: { font: { size: 7 } } } } }
        });
    }

    function toggleUnits(e) {
        e.preventDefault(); e.stopPropagation(); unitMode = unitMode === 'KG' ? 'LB' : 'KG';
        document.getElementById('currentUnitText').innerText = unitMode === 'KG' ? 'KG / CM' : 'LB / IN';
        renderTable(globalData);
        if(currentPatient && document.getElementById('modalDetalle').style.display === 'block') selectPatient(currentPatient);
    }

    function closeModal() { document.getElementById('modalDetalle').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function openNewClientModal() { document.getElementById('modalNuevo').style.display = 'block'; }
    function closeNewClientModal() { document.getElementById('modalNuevo').style.display = 'none'; }

    async function saveNewClient() {
        const cliente = { id: document.getElementById('newID').value, nombre: document.getElementById('newName').value, sexo: document.getElementById('newGender').value, edad: document.getElementById('newAge').value, altura: document.getElementById('newHeight').value, peso: document.getElementById('newWeight').value, grasa: document.getElementById('newFat').value, fechaInicio: new Date().toISOString() };
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "guardarCliente", cliente }) });
        closeNewClientModal(); fetchData();
    }

    async function addSession() {
        const avance = { id: currentPatient.id, fecha: new Date().toISOString(), peso: document.getElementById('sessWeight').value, grasa: document.getElementById('sessFat').value || 0 };
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "agregarAvance", avance }) });
        closeModal(); fetchData();
    }

    function filterTable() { const q = document.getElementById('searchInput').value.toLowerCase(), rows = document.querySelectorAll('#clientTableBody tr'); rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none'); }
    window.onload = fetchData;
</script>
</body>
</html>
