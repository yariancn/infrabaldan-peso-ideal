<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyHyperbaric - Clinical Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .main-logo { height: 120px !important; width: auto !important; }
        .card-clinical { background: white; border-radius: 35px; border: 1px solid #f1f5f9; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .titan-btn { background: #1e293b; color: white; transition: all 0.2s; }
        .titan-btn:hover { background: #334155; transform: translateY(-1px); }
    </style>
</head>
<body class="antialiased text-slate-900">

<div class="max-w-6xl mx-auto p-4 md:p-8">

    <header class="flex flex-col items-center mb-10">
        <img src="logo.jpg" alt="Oxy Hyperbaric" class="main-logo mb-6 object-contain" onerror="this.src='https://via.placeholder.com/400x120?text=OXY+HYPERBARIC';">
        <h1 class="text-4xl font-black tracking-tighter uppercase italic">Oxy Clinical Board</h1>
        <div class="h-1.5 w-24 bg-blue-600 mt-2"></div>
    </header>

    <section class="card-clinical p-8 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
            <input type="text" id="newName" placeholder="Nombre" class="bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-100">
            <input type="number" id="newWeight" placeholder="Peso Inicial" class="bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-100">
            <input type="number" id="newAge" placeholder="Edad" class="bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-100">
            <select id="newGender" class="bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-100 font-bold text-slate-500">
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
            </select>
            <button onclick="saveNewClient()" class="titan-btn rounded-2xl font-bold uppercase text-[10px] tracking-widest">Crear Perfil</button>
        </div>
    </section>

    <div class="flex justify-between items-center mb-6 px-4">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 Buscar..." class="bg-white border border-slate-200 rounded-2xl px-6 py-2 text-sm w-64 shadow-sm">
        <button onclick="toggleUnits(event)" class="bg-white border border-slate-200 py-2 px-6 rounded-xl font-bold text-blue-600 text-sm shadow-sm">
            Unidades: <span id="currentUnitText">KG</span>
        </button>
    </div>

    <div class="card-clinical overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-50 text-[10px] uppercase tracking-widest text-slate-400 font-black">
                <tr>
                    <th class="px-8 py-5">Paciente</th>
                    <th class="px-8 py-5 text-center">Plan</th>
                    <th class="px-8 py-5 text-center">Peso Actual</th>
                    <th class="px-8 py-5 text-right">Ver</th>
                </tr>
            </thead>
            <tbody id="clientTableBody" class="divide-y divide-slate-50 italic font-medium text-slate-700">
                </tbody>
        </table>
    </div>
</div>

<div id="modalDetalle" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-5xl rounded-[50px] p-10 max-h-[95vh] overflow-y-auto relative shadow-2xl">
        <button onclick="closeModal()" class="absolute top-8 right-10 text-slate-300 hover:text-slate-900 text-3xl font-light">✕</button>
        
        <div class="flex flex-col md:flex-row justify-between items-start mb-8">
            <div>
                <h2 id="modalNombre" class="text-4xl font-black text-slate-900 tracking-tighter italic uppercase">Paciente</h2>
                <p id="modalInfo" class="text-[10px] font-bold text-slate-400 uppercase mt-2 tracking-widest">--</p>
            </div>
            <div class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-center shadow-lg shadow-blue-100">
                <p class="text-[9px] uppercase font-bold opacity-80">Meta de Descenso</p>
                <p id="targetGoal" class="text-xl font-black italic">-- KG</p>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Grasa Visceral</p>
                <div id="visceralFat" class="text-xl font-black text-slate-800">--</div>
            </div>
            <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Agua Corporal</p>
                <div id="bodyWater" class="text-xl font-black text-slate-800">--%</div>
            </div>
            <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Masa Muscular</p>
                <div id="muscleMass" class="text-xl font-black text-slate-800">-- KG</div>
            </div>
            <div class="bg-slate-900 p-6 rounded-3xl text-white">
                <p class="text-[9px] font-bold text-blue-400 uppercase mb-1">BMR (Metabolismo)</p>
                <div id="displayBMR" class="text-xl font-black">-- kcal</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="card-clinical p-8 border-slate-200">
                <h3 class="font-bold text-[10px] uppercase mb-6 tracking-widest text-blue-600 italic">Registrar Sesión Wyze</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-2">Peso Actual</label>
                        <input type="number" id="sessWeight" class="w-full bg-slate-50 p-4 rounded-2xl border-none mt-1">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-2">% Grasa</label>
                        <input type="number" id="sessFat" class="w-full bg-slate-50 p-4 rounded-2xl border-none mt-1">
                    </div>
                    <button onclick="addSession()" class="w-full titan-btn py-4 rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-xl">Registrar Avance</button>
                </div>
            </div>

            <div class="md:col-span-2 card-clinical p-8 border-slate-200">
                <p class="text-[10px] font-bold text-slate-300 uppercase mb-4 text-center">Evolución vs Meta (1lb/sesión)</p>
                <canvas id="progressChart" height="150"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyfTBe73GaXzem3p08rDd6N5ebXgBt2EROVx6HbrMrPATX2a8bbkoPiV1PhyifbjUU6/exec";
let unitMode = 'KG';
let chartInstance = null;
let currentPatient = null;

window.onload = fetchData;

async function fetchData() {
    try {
        const res = await fetch(`${WEB_APP_URL}?action=obtenerClientes`);
        const data = await res.json();
        renderTable(data);
    } catch (e) { console.error("Error cargando base de datos", e); }
}

function renderTable(data) {
    const tbody = document.getElementById('clientTableBody');
    tbody.innerHTML = '';
    data.forEach(p => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50 cursor-pointer transition-all border-b border-slate-50";
        tr.onclick = () => selectPatient(p);
        tr.innerHTML = `
            <td class="px-8 py-5 font-bold text-slate-900">${p.nombre}</td>
            <td class="px-8 py-5 text-center text-[9px] font-bold text-slate-400 uppercase">2 Sesiones/Semana</td>
            <td class="px-8 py-5 text-center font-black text-blue-600">${p.peso} KG</td>
            <td class="px-8 py-5 text-right text-slate-300">➔</td>
        `;
        tbody.appendChild(tr);
    });
}

function selectPatient(p) {
    currentPatient = p;
    document.getElementById('modalNombre').innerText = p.nombre;
    document.getElementById('modalInfo').innerText = `${p.sexo} | ${p.edad} años | Inicio: ${p.fechaInicio}`;
    
    // Cálculos de Composición (Preparación Wyze)
    const masaMagra = p.peso * (1 - (p.grasa / 100));
    const bmr = 370 + (21.6 * masaMagra);
    document.getElementById('displayBMR').innerText = Math.round(bmr);
    
    // Meta Lineal (1lb = 0.45kg)
    const metaGrasa = p.sexo === 'Masculino' ? 18 : 25;
    const pesoObjetivo = (masaMagra / (1 - (metaGrasa / 100))).toFixed(1);
    document.getElementById('targetGoal').innerText = `${pesoObjetivo} ${unitMode}`;

    initChart(p, pesoObjetivo);
    document.getElementById('modalDetalle').classList.remove('hidden');
}

function initChart(p, targetWeight) {
    const ctx = document.getElementById('progressChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();

    // Simulación de línea de meta (Descenso de 0.45kg por sesión)
    const metaData = [p.peso];
    for(let i=1; i<10; i++) {
        let next = metaData[i-1] - 0.45;
        metaData.push(next > targetWeight ? next : targetWeight);
    }

    const avanceData = p.avances ? p.avances.map(a => a.peso) : [p.peso];
    const labels = Array.from({length: 10}, (_, i) => `S${i+1}`);

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: 'Real', data: avanceData, borderColor: '#2563eb', tension: 0.4, borderWidth: 3 },
                { label: 'Objetivo', data: metaData, borderColor: '#e2e8f0', borderDash: [5, 5], tension: 0 }
            ]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false } } }
    });
}

async function addSession() {
    const peso = parseFloat(document.getElementById('sessWeight').value);
    const grasa = parseFloat(document.getElementById('sessFat').value);
    
    if (!peso || !currentPatient) return;

    let pesoKG = (unitMode === 'LB') ? peso / 2.20462 : peso;

    const avance = {
        id: currentPatient.id,
        fecha: new Date().toLocaleDateString(),
        peso: pesoKG.toFixed(2),
        grasa: grasa || 0
    };

    try {
        await fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: "agregarAvance", avance })
        });
        alert("Avance Registrado");
        closeModal();
        fetchData();
    } catch (e) { alert("Error al registrar avance"); }
}

function toggleUnits(e) {
    if(e) e.stopPropagation();
    unitMode = unitMode === 'KG' ? 'LB' : 'KG';
    document.getElementById('currentUnitText').innerText = unitMode;
    document.getElementById('newWeight').placeholder = `Peso (${unitMode})`;
}

function closeModal() { document.getElementById('modalDetalle').classList.add('hidden'); }

async function saveNewClient() {
    const nombre = document.getElementById('newName').value;
    const peso = parseFloat(document.getElementById('newWeight').value);
    const edad = document.getElementById('newAge').value;
    const sexo = document.getElementById('newGender').value;

    if(!nombre || !peso) return;
    let pKG = unitMode === 'LB' ? peso / 2.20462 : peso;

    const cliente = {
        id: Date.now(), nombre, sexo, edad, peso: pKG.toFixed(2),
        altura: 170, grasa: 25, grasaObjetivo: 18, fechaInicio: new Date().toLocaleDateString()
    };

    await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ action: "guardarCliente", cliente })
    });
    fetchData();
}
</script>
</body>
</html>
