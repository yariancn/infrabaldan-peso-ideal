<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictaCore Titán - Clinical Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .main-logo { height: 120px !important; width: auto !important; min-height: 120px; }
        .predicta-card { background: white; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; }
        .titan-btn { background: #1e293b; color: white; transition: all 0.2s; font-weight: 900; }
        .titan-btn:hover { background: #334155; transform: translateY(-1px); }
        .input-titan { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 15px; padding: 12px 16px; width: 100%; outline: none; font-size: 14px; }
        .unit-control { position: fixed; top: 20px; right: 20px; z-index: 100; }

        /* ESTILOS DE IMPRESIÓN PREDICTACORE */
        @media print {
            .no-print, .unit-control, .titan-btn, #searchInput, .absolute, button { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .predicta-card { box-shadow: none !important; border: 1px solid #eee !important; page-break-inside: avoid; }
            #modalDetalle { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; background: white !important; display: block !important; }
            .max-w-5xl { max-width: 100% !important; width: 100% !important; }
            canvas { max-width: 100% !important; height: auto !important; }
        }
    </style>
</head>
<body class="antialiased text-gray-900 p-4 md:p-8">

    <div class="unit-control no-print">
        <button onclick="toggleUnits(event)" class="bg-blue-600 text-white py-3 px-8 rounded-2xl font-black text-[11px] shadow-lg shadow-blue-100 uppercase tracking-widest border-none">
            Unidades: <span id="currentUnitText">KG / CM</span>
        </button>
    </div>

    <header class="flex flex-col items-center mb-10 no-print">
        <div class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-2 text-right w-full max-w-6xl">
            Versión: 15 Abr 2026 - 11:42 AM (Print Logic)
        </div>
        <img src="logo.jpg" alt="Oxy Hyperbaric" class="main-logo mb-6 object-contain" onerror="this.src='https://via.placeholder.com/400x120?text=OXY+HYPERBARIC';">
        <h1 class="text-4xl font-black text-black tracking-tighter uppercase italic text-center leading-none">PredictaCore Titán</h1>
        <div class="h-1.5 w-24 bg-blue-600 mt-3"></div>
    </header>

    <main class="max-w-6xl mx-auto no-print">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="openNewClientModal()" class="titan-btn px-8 py-4 rounded-2xl text-[11px] uppercase tracking-widest shadow-xl">+ Nuevo Paciente</button>
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 Buscar..." class="bg-white border-none rounded-2xl px-6 py-4 text-sm w-full md:w-80 shadow-sm ring-1 ring-gray-100 focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="predicta-card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-[10px] font-black uppercase text-gray-400 tracking-widest border-b border-gray-100">
                    <tr>
                        <th class="px-10 py-6">Paciente</th>
                        <th class="px-10 py-6 text-center text-blue-600 italic">Peso Actual</th>
                        <th class="px-10 py-6 text-center">Perfil Clínico</th>
                        <th class="px-10 py-6 text-right">Ficha</th>
                    </tr>
                </thead>
                <tbody id="clientTableBody" class="divide-y divide-gray-50 font-medium text-gray-700 italic"></tbody>
            </table>
        </div>
    </main>

    <div id="modalNuevo" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[70] no-print">
        <div class="bg-white w-full max-w-2xl rounded-[40px] p-10 shadow-2xl relative">
            <button onclick="closeNewClientModal()" class="absolute top-8 right-10 text-gray-300 hover:text-black text-2xl font-light">✕</button>
            <h2 class="text-2xl font-black uppercase italic tracking-tighter mb-8 border-l-4 border-blue-600 pl-4">Nuevo Perfil Clínico</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" id="newID" class="input-titan" placeholder="ID Manual">
                <input type="text" id="newName" class="input-titan" placeholder="Nombre Completo">
                <input type="number" id="newAge" class="input-titan" placeholder="Edad">
                <input type="number" id="newHeight" class="input-titan" placeholder="Altura">
                <select id="newGender" class="input-titan font-bold"><option value="Masculino">Masculino</option><option value="Femenino">Femenino</option></select>
                <input type="number" id="newWeight" class="input-titan" placeholder="Peso Inicial">
                <input type="number" id="newFat" class="input-titan" placeholder="Grasa % Actual">
                <input type="number" id="newFatTarget" class="input-titan" placeholder="Grasa % Objetivo">
            </div>
            <button onclick="saveNewClient()" class="w-full titan-btn py-4 rounded-2xl mt-8 uppercase tracking-widest text-xs">Crear Registro</button>
        </div>
    </div>

    <div id="modalDetalle" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-[60] overflow-y-auto">
        <div class="bg-white w-full max-w-5xl rounded-[50px] p-12 relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-8 right-10 text-gray-300 hover:text-black text-3xl font-light no-print">✕</button>
            
            <header class="mb-10 flex flex-col md:flex-row justify-between items-start border-b pb-8">
                <div>
                    <h2 id="modalNombre" class="text-5xl font-black text-gray-950 tracking-tighter italic uppercase leading-none">Paciente</h2>
                    <div class="flex gap-4 mt-4">
                        <span id="modalInfo" class="px-3 py-1 bg-gray-100 text-[10px] font-bold rounded-full uppercase tracking-widest">--</span>
                        <span id="prognosisBadge" class="px-3 py-1 bg-blue-600 text-white text-[10px] font-bold rounded-full uppercase italic tracking-widest italic">--</span>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-3">
                    <div class="bg-blue-600 text-white px-8 py-5 rounded-3xl text-center shadow-lg shadow-blue-100">
                        <p class="text-[9px] uppercase font-bold opacity-80 mb-1 italic">Target Salud Óptima</p>
                        <p id="targetWeightDisplay" class="text-2xl font-black italic">--</p>
                    </div>
                    <button onclick="window.print()" class="no-print bg-gray-900 text-white px-6 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-black transition-all">
                        🖨️ Generar Reporte PDF
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                <div class="bg-gray-50 p-8 rounded-[35px] border border-gray-100">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Grasa Visceral</p>
                    <p id="visceralFat" class="text-3xl font-black text-slate-800">--</p>
                </div>
                <div class="bg-gray-50 p-8 rounded-[35px] border border-gray-100">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Motor Muscular</p>
                    <p id="muscleMass" class="text-3xl font-black text-slate-800">--</p>
                </div>
                <div class="bg-gray-950 p-8 rounded-[35px] text-white">
                    <p class="text-[10px] font-black text-blue-400 uppercase mb-2 italic text-center">Metabolismo BMR</p>
                    <p id="displayBMR" class="text-3xl font-black text-center">--</p>
                </div>
            </div>

            <div class="predicta-card p-10 mb-10 border-2 border-gray-50">
                <h3 class="text-[11px] font-black uppercase mb-6 text-gray-400 tracking-widest">Ruta Crítica vs Progreso Real</h3>
                <div class="h-[350px]">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>

            <div class="bg-gray-50 p-8 rounded-[40px] no-print">
                <h3 class="text-[10px] font-black uppercase mb-6 text-gray-400 tracking-widest italic">Registrar Nueva Sesión de Control</h3>
                <div class="flex gap-4">
                    <input type="number" id="sessWeight" class="input-titan flex-1" placeholder="Peso Hoy">
                    <input type="number" id="sessFat" class="input-titan flex-1" placeholder="% Grasa Wyze">
                    <button onclick="addSession()" class="titan-btn px-10 py-4 rounded-2xl text-[10px] uppercase tracking-widest">Registrar</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyfTBe73GaXzem3p08rDd6N5ebXgBt2EROVx6HbrMrPATX2a8bbkoPiV1PhyifbjUU6/exec";
    let unitMode = 'KG';
    let currentPatient = null;
    let chartInstance = null;
    let globalData = [];

    async function fetchData() {
        try {
            const res = await fetch(`${WEB_APP_URL}?action=obtenerClientes`);
            globalData = await res.json();
            renderTable(globalData);
        } catch (e) { console.error(e); }
    }

    function convP(val) {
        val = parseFloat(val);
        return unitMode === 'LB' ? (val * 2.20462).toFixed(1) : val.toFixed(1);
    }

    function renderTable(data) {
        const tbody = document.getElementById('clientTableBody');
        tbody.innerHTML = '';
        data.forEach(p => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-blue-50 cursor-pointer transition-all border-b border-gray-100 group";
            tr.onclick = () => selectPatient(p);
            tr.innerHTML = `<td class="px-10 py-6 font-bold text-gray-900 group-hover:text-blue-600">${p.nombre}</td>
                <td class="px-10 py-6 text-center font-black text-blue-600 text-xl">${convP(p.peso)} ${unitMode}</td>
                <td class="px-10 py-6 text-center text-[10px] text-gray-400 font-black uppercase">${p.sexo} | ${p.edad} AÑOS</td>
                <td class="px-10 py-6 text-right text-blue-200">➔</td>`;
            tbody.appendChild(tr);
        });
    }

    function selectPatient(p) {
        currentPatient = p;
        document.getElementById('modalNombre').innerText = p.nombre;
        const dateObj = new Date(p.fechaInicio);
        const fecha = dateObj.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
        document.getElementById('modalInfo').innerText = `${p.sexo} | ${p.edad} AÑOS | INICIO: ${fecha}`;
        
        // Lógica PredictaCore
        const pesoKG = parseFloat(p.peso);
        const grasaActual = parseFloat(p.grasa) / 100;
        const masaMagra = pesoKG * (1 - grasaActual);
        const grasaObjetivo = parseFloat(p.grasaObjetivo) / 100 || 0.15;
        const targetWeightKG = masaMagra / (1 - grasaObjetivo);
        const deficitKG = pesoKG - targetWeightKG;
        const semanasMeta = Math.ceil(deficitKG / 0.9);

        document.getElementById('targetWeightDisplay').innerText = `${convP(targetWeightKG)} ${unitMode}`;
        document.getElementById('prognosisBadge').innerText = `Pronóstico: ${semanasMeta} Semanas`;
        document.getElementById('muscleMass').innerText = `${convP(masaMagra)} ${unitMode}`;
        document.getElementById('displayBMR').innerText = Math.round(370 + (21.6 * masaMagra));
        document.getElementById('visceralFat').innerText = p.grasaVisceral || "9";

        initChart(p, targetWeightKG);
        document.getElementById('modalDetalle').classList.remove('hidden');
    }

    function initChart(p, targetKG) {
        const ctx = document.getElementById('progressChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        const pIni = parseFloat(p.peso);
        const startPoint = parseFloat(convP(pIni));
        const targetPoint = parseFloat(convP(targetKG));
        
        const labels = [];
        const metaData = [startPoint];
        const step = unitMode === 'KG' ? 0.45 : 1.0;
        const sessions = Math.max(Math.ceil((pIni - targetKG) / 0.45), 10);

        for(let i=1; i<=sessions; i++) {
            let next = metaData[i-1] - step;
            metaData.push(next > targetPoint ? next.toFixed(1) : targetPoint.toFixed(1));
            labels.push(`S${i} (W${Math.floor((i-1)/2)+1})`);
        }
        labels.push(`S${sessions+1}`);

        const realData = [startPoint];
        if(p.avances) {
            p.avances.sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
            p.avances.forEach(a => realData.push(parseFloat(convP(a.peso))));
        }

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Real', data: realData, borderColor: '#2563eb', tension: 0.3, borderWidth: 5, pointRadius: 6, backgroundColor: '#2563eb' },
                    { label: 'Meta', data: metaData, borderColor: '#e2e8f0', borderDash: [6,6], tension: 0, pointRadius: 0 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function toggleUnits(e) {
        e.preventDefault(); e.stopPropagation();
        unitMode = unitMode === 'KG' ? 'LB' : 'KG';
        document.getElementById('currentUnitText').innerText = unitMode + " / " + (unitMode === 'KG' ? 'CM' : 'IN');
        renderTable(globalData);
        if(currentPatient) selectPatient(currentPatient);
    }

    async function saveNewClient() {
        const pRaw = parseFloat(document.getElementById('newWeight').value);
        let pKG = unitMode === 'LB' ? pRaw / 2.20462 : pRaw;
        const cliente = {
            id: document.getElementById('newID').value,
            nombre: document.getElementById('newName').value,
            sexo: document.getElementById('newGender').value,
            edad: document.getElementById('newAge').value,
            altura: document.getElementById('newHeight').value,
            peso: pKG.toFixed(2),
            grasa: document.getElementById('newFat').value,
            grasaObjetivo: document.getElementById('newFatTarget').value,
            fechaInicio: new Date().toISOString()
        };
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "guardarCliente", cliente }) });
        closeNewClientModal(); fetchData();
    }

    async function addSession() {
        const pRaw = parseFloat(document.getElementById('sessWeight').value);
        if(!pRaw) return;
        let pKG = unitMode === 'LB' ? pRaw / 2.20462 : pRaw;
        const avance = { id: currentPatient.id, fecha: new Date().toISOString(), peso: pKG.toFixed(2) };
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "agregarAvance", avance }) });
        closeModal(); fetchData();
    }

    function openNewClientModal() { document.getElementById('modalNuevo').classList.remove('hidden'); }
    function closeNewClientModal() { document.getElementById('modalNuevo').classList.add('hidden'); }
    function closeModal() { document.getElementById('modalDetalle').classList.add('hidden'); }
    window.onload = fetchData;
</script>
</body>
</html>
