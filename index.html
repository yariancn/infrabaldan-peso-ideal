<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyHyperbaric Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .main-logo { height: 120px !important; width: auto !important; min-height: 120px !important; display: block; }
        .btn-primary { background: #2563eb; color: white; font-weight: 800; transition: all 0.2s; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body class="antialiased text-slate-900">

<div class="max-w-6xl mx-auto p-4 md:p-8">

    <header class="flex flex-col items-center mb-12">
        <img src="logo.jpg" alt="Oxy Hyperbaric" class="main-logo mb-6 object-contain" 
             onerror="this.src='https://via.placeholder.com/400x120/000000/ffffff?text=OXY+HYPERBARIC';">
        <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase italic text-center">Clinical Dashboard</h1>
        <div class="h-1.5 w-24 bg-blue-600 mt-3"></div>
    </header>

    <section class="bg-white rounded-[32px] card-shadow p-8 mb-8 border border-slate-100">
        <div class="flex justify-between items-center mb-6 px-2">
            <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Registro Clínico / Nuevo Perfil</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
            <input type="text" id="newName" placeholder="Nombre Completo" class="bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500">
            <input type="number" id="newWeight" placeholder="Peso" class="bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500">
            <input type="number" id="newAge" placeholder="Edad" class="bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500">
            <select id="newGender" class="bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500 font-bold text-slate-500">
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
            </select>
            <button onclick="saveNewClient()" class="btn-primary rounded-2xl py-4 uppercase tracking-widest text-xs shadow-lg shadow-blue-100">
                Guardar
            </button>
        </div>
    </section>

    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 px-4">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 Buscar paciente..." 
                   class="bg-white border border-slate-200 rounded-2xl px-6 py-3 text-sm w-full md:w-80 focus:ring-2 focus:ring-blue-500 shadow-sm">
        
        <button onclick="toggleUnits(event)" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-3 px-8 rounded-2xl transition-all shadow-sm">
            Unidades: <span id="currentUnitText" class="text-blue-600 uppercase tracking-tighter">KG</span>
        </button>
    </div>

    <div class="bg-white rounded-[32px] card-shadow overflow-hidden border border-slate-100">
        <table class="w-full text-left">
            <thead class="bg-slate-50 text-[10px] uppercase tracking-widest text-slate-400 font-black">
                <tr>
                    <th class="px-10 py-6">Nombre del Paciente</th>
                    <th class="px-10 py-6 text-center">Perfil Clínico</th>
                    <th class="px-10 py-6 text-center">Peso Actual</th>
                    <th class="px-10 py-6 text-right">Ver</th>
                </tr>
            </thead>
            <tbody id="clientTableBody" class="divide-y divide-slate-50 italic">
                </tbody>
        </table>
    </div>
</div>

<div id="modalDetalle" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-4xl rounded-[40px] p-10 max-h-[90vh] overflow-y-auto relative shadow-2xl">
        <button onclick="closeModal()" class="absolute top-8 right-10 text-slate-300 hover:text-slate-900 text-3xl font-light">✕</button>
        <header class="mb-10">
            <h2 id="modalNombre" class="text-4xl font-black text-slate-900 tracking-tighter italic uppercase">Paciente</h2>
            <p id="modalInfo" class="text-[10px] font-bold text-slate-400 uppercase mt-2 tracking-widest italic">--</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-blue-50 p-8 rounded-3xl border border-blue-100 text-center">
                <p class="text-[10px] font-bold text-blue-400 uppercase mb-1">Target Fat %</p>
                <div id="targetFat" class="text-2xl font-black text-slate-800">--</div>
            </div>
            <div class="bg-slate-50 p-8 rounded-3xl border border-slate-100 text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Optimal FFMI</p>
                <div id="optimalFFMI" class="text-2xl font-black text-slate-800">--</div>
            </div>
            <div class="bg-slate-900 p-8 rounded-3xl text-white text-center">
                <p class="text-[10px] font-bold text-blue-400 uppercase mb-1">Metabolic Status</p>
                <div class="text-2xl font-black">Optimal</div>
            </div>
        </div>
    </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyfTBe73GaXzem3p08rDd6N5ebXgBt2EROVx6HbrMrPATX2a8bbkoPiV1PhyifbjUU6/exec";
let unitMode = 'KG';

window.onload = () => { fetchData(); };

// 1. OBTENER DATOS (doGet en tu script)
async function fetchData() {
    try {
        const res = await fetch(`${WEB_APP_URL}?action=obtenerClientes`);
        const data = await res.json();
        renderTable(data);
    } catch (e) { console.error("Error de conexión", e); }
}

function renderTable(data) {
    const tbody = document.getElementById('clientTableBody');
    tbody.innerHTML = '';
    data.forEach(p => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50 cursor-pointer transition-all border-b border-slate-50";
        tr.onclick = () => selectClient(p);
        tr.innerHTML = `
            <td class="px-10 py-6 font-bold text-slate-800">${p.nombre}</td>
            <td class="px-10 py-6 text-center text-[10px] text-slate-400 font-black uppercase">${p.sexo} | ${p.edad} años</td>
            <td class="px-10 py-6 text-center font-black text-blue-600">${p.peso} KG</td>
            <td class="px-10 py-6 text-right">➔</td>
        `;
        tbody.appendChild(tr);
    });
}

// 2. UNIDADES
function toggleUnits(e) {
    if(e) { e.preventDefault(); e.stopPropagation(); }
    unitMode = (unitMode === 'KG') ? 'LB' : 'KG';
    document.getElementById('currentUnitText').innerText = unitMode;
    document.getElementById('newWeight').placeholder = `Peso (${unitMode})`;
}

// 3. GUARDAR (doPost en tu script)
async function saveNewClient() {
    const nombre = document.getElementById('newName').value;
    let pesoInput = parseFloat(document.getElementById('newWeight').value);
    const edad = document.getElementById('newAge').value;
    const sexo = document.getElementById('newGender').value;

    if (!nombre || isNaN(pesoInput)) return alert("Completa nombre y peso");

    // Conversión a KG antes de enviar
    let pesoKG = (unitMode === 'LB') ? pesoInput / 2.20462 : pesoInput;

    const cliente = {
        id: Date.now(),
        nombre, sexo, edad,
        peso: pesoKG.toFixed(2),
        altura: 170, // Valor base
        grasa: 20, grasaObjetivo: 15,
        fechaInicio: new Date().toLocaleDateString()
    };

    try {
        await fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', 
            body: JSON.stringify({ action: "guardarCliente", cliente })
        });
        alert("Enviado. La lista se actualizará en unos segundos.");
        setTimeout(fetchData, 2000);
    } catch (e) { alert("Error al guardar"); }
}

function selectClient(p) {
    document.getElementById('modalNombre').innerText = p.nombre;
    document.getElementById('modalInfo').innerText = `${p.sexo} | ${p.edad} años | Altura: ${p.altura}cm`;
    document.getElementById('targetFat').innerText = (p.sexo === 'Masculino') ? "14-22%" : "21-31%";
    document.getElementById('optimalFFMI').innerText = (p.sexo === 'Masculino') ? "20.5-22" : "17.5-19.5";
    document.getElementById('modalDetalle').classList.remove('hidden');
}

function closeModal() { document.getElementById('modalDetalle').classList.add('hidden'); }

function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const rows = document.querySelectorAll('#clientTableBody tr');
    rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none');
}
</script>
</body>
</html>
