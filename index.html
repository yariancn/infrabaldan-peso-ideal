<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infra Baldan - Oxy Hyperbaric</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui; }
    #graficaContainer { height: 220px; position: relative; }
  </style>
</head>
<body class="bg-gray-50">

<div class="max-w-6xl mx-auto p-6">
  <div class="flex flex-col items-center mb-6">
    <img src="logo.jpg" alt="Oxy Hyperbaric" class="h-20 mb-4" onerror="this.src='https://via.placeholder.com/200x80/0ea5e9/ffffff?text=OXY';">
    <h1 class="text-4xl font-bold text-center text-black">Infra Baldan</h1>
    <p class="text-gray-500">Seguimiento de Peso y Composición Corporal</p>
  </div>

  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
    <button onclick="nuevoCliente()" class="bg-black text-white px-6 py-3 rounded-2xl hover:bg-gray-800 flex items-center gap-2">
      <span>+</span> Nuevo Cliente
    </button>
    <div class="flex gap-3 w-full sm:w-auto">
      <button onclick="toggleUnidadesGlobal()" class="bg-white border border-gray-300 px-6 py-3 rounded-2xl text-sm font-medium">
        Unidades: <span id="unidadGlobalText">kg / cm</span>
      </button>
      <input id="buscar" type="text" placeholder="Buscar cliente..." onkeyup="renderLista()" class="flex-1 px-5 py-3 border border-gray-300 rounded-2xl">
    </div>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="listaClientes"></div>
</div>

<div id="modalCliente" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl w-full max-w-lg mx-4 p-6">
    <h2 class="text-2xl font-bold mb-6">Nuevo Cliente</h2>
    <div class="space-y-5">
      <input id="idPaciente" placeholder="ID del Paciente (Manual)" class="w-full px-4 py-3 border border-blue-200 rounded-2xl text-lg font-bold bg-blue-50">
      <input id="nombre" placeholder="Nombre completo" class="w-full px-4 py-3 border rounded-2xl text-lg">
      <div class="grid grid-cols-2 gap-4">
        <select id="sexo" onchange="actualizarGrasaIdeal()" class="px-4 py-3 border rounded-2xl">
          <option value="M">Hombre</option>
          <option value="F">Mujer</option>
        </select>
        <input id="edad" type="number" placeholder="Edad" class="px-4 py-3 border rounded-2xl">
      </div>
      <div class="grid grid-cols-3 gap-4">
        <input id="altura" type="number" step="0.1" placeholder="Altura (cm)" class="px-4 py-3 border rounded-2xl">
        <input id="peso" type="number" step="0.1" placeholder="Peso (kg)" class="px-4 py-3 border rounded-2xl">
        <input id="grasa" type="number" step="0.1" placeholder="% Grasa" class="px-4 py-3 border rounded-2xl">
      </div>
      <input id="grasaObjetivo" type="number" step="0.1" value="15" class="w-full px-4 py-3 border rounded-2xl text-lg font-medium">
    </div>
    <div class="flex gap-3 mt-8">
      <button onclick="cerrarModal()" class="flex-1 py-4 text-gray-600 font-medium">Cancelar</button>
      <button onclick="guardarCliente()" id="btnGuardar" class="flex-1 bg-black text-white py-4 rounded-2xl font-medium">Guardar Cliente</button>
    </div>
  </div>
</div>

<div id="modalDetalle" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl w-full max-w-3xl mx-4 p-6 max-h-[92vh] overflow-auto">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-bold" id="nombreDetalle"></h2>
      <button onclick="cerrarDetalle()" class="text-4xl leading-none text-gray-400 hover:text-black ml-4">×</button>
    </div>
    <div id="resumenCalculo" class="bg-gray-100 rounded-3xl p-6 mb-8"></div>
    <div id="progresoContainer" class="mb-8"></div>
    <div class="grid grid-cols-2 gap-4 mb-8 text-sm">
      <div class="bg-white border rounded-2xl p-4">
        <div class="text-gray-500">Fecha de inicio</div>
        <div class="font-medium" id="fechaInicio"></div>
      </div>
      <div class="bg-white border rounded-2xl p-4">
        <div class="text-gray-500">Semanas transcurridas</div>
        <div class="font-medium" id="semanasTranscurridas"></div>
      </div>
    </div>
    <div class="mb-8">
      <h4 class="text-sm font-medium text-gray-600 mb-3">Evolución de Peso</h4>
      <div id="graficaContainer" class="border border-gray-200 rounded-3xl p-4 bg-white">
        <canvas id="grafica"></canvas>
      </div>
    </div>
    <h3 class="font-semibold mb-4">Registrar Avance Semanal</h3>
    <div class="grid grid-cols-3 gap-4 mb-8">
      <input id="fechaAvance" type="date" class="px-4 py-3 border rounded-2xl">
      <input id="pesoAvance" type="number" step="0.1" placeholder="Peso" class="px-4 py-3 border rounded-2xl">
      <input id="grasaAvance" type="number" step="0.1" placeholder="% Grasa" class="px-4 py-3 border rounded-2xl">
      <button onclick="agregarAvance()" id="btnAvance" class="col-span-3 bg-black text-white py-4 rounded-2xl font-medium">Guardar Avance</button>
    </div>
  </div>
</div>

<script>
  // URL actualizada según tu última implementación
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyfTBe73GaXzem3p08rDd6N5ebXgBt2EROVx6HbrMrPATX2a8bbkoPiV1PhyifbjUU6/exec";
  
  let clientes = [];
  let clienteSeleccionado = null;
  let usaLibras = false;
  let chartInstance = null;

  const KG_TO_LBS = 2.20462;
  const CM_TO_IN = 2.54;

  function toggleUnidadesGlobal() {
    usaLibras = !usaLibras;
    const uP = usaLibras ? "lbs" : "kg";
    const uA = usaLibras ? "in" : "cm";
    document.getElementById('unidadGlobalText').textContent = `${uP} / ${uA}`;
    if (clienteSeleccionado) verDetalle(clienteSeleccionado);
  }

  function actualizarGrasaIdeal() {
    const sexo = document.getElementById('sexo').value;
    document.getElementById('grasaObjetivo').value = sexo === 'M' ? 15 : 22;
  }

  function calcularIdeal(c) {
    const peso = parseFloat(c.peso) || 0;
    const grasaActual = parseFloat(c.grasa) || 0;
    const grasaIdeal = parseFloat(c.grasaObjetivo) || (c.sexo === 'M' ? 15 : 22);
    const masaMagra = peso * (1 - grasaActual / 100);
    const pesoIdeal = masaMagra / (1 - grasaIdeal / 100);
    return { pesoIdeal, kgBajar: Math.max(0, peso - pesoIdeal), grasaIdeal };
  }

  async function cargarClientes() {
    try {
      const res = await fetch(WEB_APP_URL + "?action=obtenerClientes");
      clientes = await res.json();
      renderLista();
    } catch (e) { console.error("Error cargando clientes:", e); }
  }

  async function guardarCliente() {
    const id = document.getElementById('idPaciente').value.trim();
    if(!id) return alert("ID requerido");
    const btn = document.getElementById('btnGuardar');
    btn.disabled = true; btn.textContent = "Guardando...";
    
    let p = parseFloat(document.getElementById('peso').value) || 0;
    let a = parseFloat(document.getElementById('altura').value) || 170;
    if (usaLibras) { p /= KG_TO_LBS; a *= CM_TO_IN; }

    const cliente = {
      id, nombre: document.getElementById('nombre').value, sexo: document.getElementById('sexo').value,
      edad: document.getElementById('edad').value, altura: a, peso: p,
      grasa: document.getElementById('grasa').value, grasaObjetivo: document.getElementById('grasaObjetivo').value,
      fechaInicio: new Date().toISOString()
    };

    try {
      await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "guardarCliente", cliente })});
      alert("Cliente guardado correctamente."); 
      cerrarModal(); 
      setTimeout(cargarClientes, 1000);
    } catch (e) { alert("Error al guardar."); }
    finally { btn.disabled = false; btn.textContent = "Guardar Cliente"; }
  }

  function renderLista() {
    const container = document.getElementById('listaClientes');
    container.innerHTML = '';
    const term = document.getElementById('buscar').value.toLowerCase();
    clientes.forEach(c => {
      if (c.nombre.toLowerCase().includes(term)) {
        const card = document.createElement('div');
        card.className = "bg-white rounded-3xl shadow p-6 cursor-pointer hover:shadow-xl transition";
        card.innerHTML = `<div class="text-xs font-bold text-blue-500 mb-1">ID: ${c.id}</div><div class="font-semibold text-xl mb-1">${c.nombre}</div>`;
        card.onclick = () => verDetalle(c);
        container.appendChild(card);
      }
    });
  }

  function verDetalle(c) {
    clienteSeleccionado = c;
    const calc = calcularIdeal(c);
    const u = usaLibras ? "lbs" : "kg";
    const factor = usaLibras ? KG_TO_LBS : 1;

    const listaAvances = c.avances || [];
    const ultimoPeso = listaAvances.length > 0 ? listaAvances[listaAvances.length - 1].peso : c.peso;
    const kgBajados = Math.max(0, c.peso - ultimoPeso);
    const pct = calc.kgBajar > 0 ? Math.min(100, (kgBajados / calc.kgBajar) * 100) : 100;

    document.getElementById('nombreDetalle').textContent = c.nombre;
    document.getElementById('resumenCalculo').innerHTML = `
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
        <div><div class="text-xs text-gray-500">PESO ACTUAL</div><div class="text-3xl font-bold">${(ultimoPeso * factor).toFixed(1)} ${u}</div></div>
        <div><div class="text-xs text-gray-500">GRASA ACTUAL</div><div class="text-3xl font-bold">${(listaAvances.length > 0 ? listaAvances[listaAvances.length-1].grasa : c.grasa)}%</div></div>
        <div><div class="text-xs text-gray-500">GRASA IDEAL</div><div class="text-3xl font-bold text-blue-600">${calc.grasaIdeal}%</div></div>
        <div><div class="text-xs text-gray-500">PESO IDEAL</div><div class="text-3xl font-bold">${(calc.pesoIdeal * factor).toFixed(1)} ${u}</div></div>
      </div>`;

    document.getElementById('progresoContainer').innerHTML = `
      <div class="bg-white border p-6 rounded-3xl">
        <div class="flex justify-between mb-2"><span class="font-medium">Progreso</span><span class="font-bold text-green-600">${pct.toFixed(0)}%</span></div>
        <div class="w-full bg-gray-200 h-3 rounded-full"><div class="bg-green-500 h-3 rounded-full" style="width:${pct}%"></div></div>
        <p class="text-xs text-gray-400 mt-2">Has bajado ${(kgBajados * factor).toFixed(1)} ${u} de ${(calc.kgBajar * factor).toFixed(1)} ${u} necesarios</p>
      </div>`;

    document.getElementById('fechaInicio').textContent = new Date(c.fechaInicio).toLocaleDateString();
    document.getElementById('fechaAvance').value = new Date().toISOString().split('T')[0];
    document.getElementById('modalDetalle').classList.remove('hidden');
    actualizarGrafica(c, factor);
  }

  function actualizarGrafica(c, factor) {
    if (chartInstance) chartInstance.destroy();
    const ctx = document.getElementById('grafica').getContext('2d');
    const labels = ["Inicio", ... (c.avances || []).map(a => new Date(a.fecha).toLocaleDateString())];
    const data = [c.peso * factor, ... (c.avances || []).map(a => a.peso * factor)];
    
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Evolución de Peso',
          data: data,
          borderColor: '#000',
          backgroundColor: 'rgba(0,0,0,0.05)',
          fill: true,
          tension: 0.3
        }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }

  async function agregarAvance() {
    const btn = document.getElementById('btnAvance');
    let p = parseFloat(document.getElementById('pesoAvance').value);
    let g = parseFloat(document.getElementById('grasaAvance').value);
    let f = document.getElementById('fechaAvance').value;
    if(!p || !g || !f) return alert("Faltan datos");

    btn.disabled = true; btn.textContent = "Guardando...";
    if (usaLibras) p /= KG_TO_LBS;

    try {
      await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
        action: "agregarAvance", 
        avance: { id: clienteSeleccionado.id, peso: p, grasa: g, fecha: f }
      })});
      alert("Avance guardado con éxito."); 
      cerrarDetalle(); 
      setTimeout(cargarClientes, 1000);
    } catch (e) { alert("Error al registrar el avance."); }
    finally { btn.disabled = false; btn.textContent = "Guardar Avance"; }
  }

  function nuevoCliente() { document.getElementById('modalCliente').classList.remove('hidden'); }
  function cerrarModal() { document.getElementById('modalCliente').classList.add('hidden'); }
  function cerrarDetalle() { document.getElementById('modalDetalle').classList.add('hidden'); }

  window.onload = cargarClientes;
</script>
</body>
</html>
