<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxy Board - Titan Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .main-logo { height: 120px !important; width: auto !important; min-height: 120px; }
        .predicta-card { background: white; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; }
        .titan-btn { background: #1e293b; color: white; transition: all 0.2s; font-weight: 900; }
        .titan-btn:hover { background: #334155; transform: translateY(-1px); }
        .input-titan { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 15px; padding: 12px 16px; width: 100%; outline: none; }
    </style>
</head>
<body class="antialiased text-gray-900 p-4 md:p-8">

    <div class="max-w-6xl mx-auto text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-2 text-right">
        Última Actualización: 15 Abr 2026 - 09:45 AM (Root Fix)
    </div>

    <header class="flex flex-col items-center mb-10">
        <img src="logo.jpg" alt="Oxy Hyperbaric" class="main-logo mb-6 object-contain" onerror="this.src='https://via.placeholder.com/400x120?text=OXY+HYPERBARIC';">
        <h1 class="text-4xl font-black text-black tracking-tighter uppercase italic text-center leading-none">PredictaCore Titán</h1>
        <div class="h-1.5 w-24 bg-blue-600 mt-3"></div>
    </header>

    <div class="max-w-6xl mx-auto flex justify-end mb-6">
        <button onclick="toggleUnits(event)" id="unitToggleBtn" class="bg-white border-2 border-blue-600 py-3 px-8 rounded-2xl font-black text-blue-600 text-[11px] shadow-sm uppercase tracking-widest">
            Unidades: <span id="currentUnitText">KG / CM</span>
        </button>
    </div>

    <main class="max-w-6xl mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="openNewClientModal()" class="titan-btn px-8 py-4 rounded-2xl text-[11px] uppercase tracking-widest shadow-xl shadow-blue-100">
                + Nuevo Paciente
            </button>
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 Buscar por nombre..." class="bg-white border-none rounded-2xl px-6 py-4 text-sm w-full md:w-80 shadow-sm ring-1 ring-gray-100 focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="predicta-card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-[10px] font-black uppercase text-gray-400 tracking-widest border-b border-gray-100">
                    <tr>
                        <th class="px-10 py-6">Paciente</th>
                        <th class="px-10 py-6 text-center">Perfil Clínico</th>
                        <th class="px-10 py-6 text-center">Peso Actual</th>
                        <th class="px-10 py-6 text-right">Detalle</th>
                    </tr>
                </thead>
                <tbody id="clientTableBody" class="divide-y divide-gray-50 font-medium text-gray-700"></tbody>
            </table>
        </div>
    </main>

    <div id="modalNuevo" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[70]">
        <div class="bg-white w-full max-w-2xl rounded-[40px] p-10 shadow-2xl relative border border-gray-100">
            <button onclick="closeNewClientModal()" class="absolute top-8 right-10 text-gray-300 hover:text-black text-2xl font-light">✕</button>
            <h2 class="text-2xl font-black uppercase italic tracking-tighter mb-8 border-l-4 border-blue-600 pl-4">Nuevo Perfil</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" id="newID" class="input-titan" placeholder="ID Paciente">
                <input type="text" id="newName" class="input-titan" placeholder="Nombre Completo">
                <input type="number" id="newAge" class="input-titan" placeholder="Edad">
                <input type="number" id="newHeight" class="input-titan" placeholder="Altura (CM)">
                <select id="newGender" class="input-titan font-bold"><option value="Masculino">Masculino</option><option value="Femenino">Femenino</option></select>
                <input type="number" id="newWeight" class="input-titan" placeholder="Peso Inicial (Actual Unit)">
                <input type="number" id="newFat" class="input-titan" placeholder="Grasa % Actual">
            </div>
            <button onclick="saveNewClient()" class="w-full titan-btn py-4 rounded-2xl mt-8 uppercase tracking-widest text-xs">Guardar e Iniciar Protocolo</button>
        </div>
    </div>

    <div id="modalDetalle" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-[60]">
        <div class="bg-white w-full max-w-5xl rounded-[50px] p-10 max-h-[95vh] overflow-y-auto relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-8 right-10 text-gray-300 hover:text-black text-3xl font-light">✕</button>
            <header class="mb-10 flex justify-between items-start">
                <div><h2 id="modalNombre" class="text-4xl font-black tracking-tighter italic uppercase">Paciente</h2><p id="modalInfo" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-2">--</p></div>
                <div class="bg-blue-600 text-white px-8 py-4 rounded-3xl text-center"><p class="text-[9px] uppercase font-bold opacity-80 mb-1">Target Peso Ideal</p><p id="targetWeightDisplay" class="text-xl font-black italic">--</p></div>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100 text-center"><p class="text-[9px] font-bold text-gray-400 uppercase">Grasa Visceral</p><p id="visceralFat" class="text-xl font-black">--</p></div>
                <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100 text-center"><p class="text-[9px] font-bold text-gray-400 uppercase">Masa Muscular</p><p id="muscleMass" class="text-xl font-black">--</p></div>
                <div class="bg-gray-950 p-6 rounded-3xl text-white text-center"><p class="text-[9px] font-bold text-blue-400 uppercase">FFMI Quality</p><p id="displayFFMI" class="text-xl font-black">--</p></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="bg-gray-50 p-8 rounded-[35px] border border-gray-100">
                    <h3 class="text-[10px] font-bold uppercase mb-4 text-blue-600 tracking-widest">Capturar Avance</h3>
                    <input type="number" id="sessWeight" placeholder="Peso Hoy" class="input-titan mb-4">
                    <input type="number" id="sessFat" placeholder="% Grasa Wyze" class="input-titan mb-4">
                    <button onclick="addSession()" class="w-full titan-btn py-4 rounded-2xl text-[10px] uppercase tracking-widest">Registrar</button>
                </div>
                <div class="md:col-span-2 bg-white border border-gray-100 p-8 rounded-[35px]"><canvas id="progressChart" height="200"></canvas></div>
            </div>
        </div>
    </div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyfTBe73GaXzem3p08rDd6N5ebXgBt2EROVx6HbrMrPATX2a8bbkoPiV1PhyifbjUU6/exec";
    let unitMode = 'KG';
    let currentPatient = null;
    let chartInstance = null;
    let globalData = [];

    async function fetchData() {
        try {
            const res = await fetch(`${WEB_APP_URL}?action=obtenerClientes`);
            globalData = await res.json();
            renderTable(globalData);
        } catch (e) { console.error(e); }
    }

    function convP(val) {
        val = parseFloat(val);
        if (unitMode === 'LB') return (val * 2.20462).toFixed(1);
        return val.toFixed(1);
    }

    function convA(val) {
        val = parseFloat(val);
        if (unitMode === 'LB') return (val / 2.54).toFixed(1) + " IN";
        return val.toFixed(0) + " CM";
    }

    function renderTable(data) {
        const tbody = document.getElementById('clientTableBody');
        tbody.innerHTML = '';
        data.forEach(p => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-blue-50 cursor-pointer transition-all border-b border-gray-100";
            tr.onclick = (e) => { 
                if(!e.target.closest('button')) selectPatient(p); 
            };
            tr.innerHTML = `<td class="px-10 py-6 font-bold text-gray-900">${p.nombre}</td>
                <td class="px-10 py-6 text-center text-[10px] text-gray-400 font-black uppercase">${p.sexo} | ${p.edad} AÑOS | ${convA(p.altura)}</td>
                <td class="px-10 py-6 text-center font-black text-blue-600">${convP(p.peso)} ${unitMode}</td>
                <td class="px-10 py-6 text-right text-blue-300">➔</td>`;
            tbody.appendChild(tr);
        });
    }

    function selectPatient(p) {
        currentPatient = p;
        document.getElementById('modalNombre').innerText = p.nombre;
        
        // CÁLCULO CIENTÍFICO CORRECTO
        const pesoKG = parseFloat(p.peso);
        const grasaActual = parseFloat(p.grasa) / 100 || 0.30;
        const masaMagra = pesoKG * (1 - grasaActual);
        const targetFat = p.sexo === 'Masculino' ? 0.20 : 0.28;
        const targetWeightKG = masaMagra / (1 - targetFat);
        
        document.getElementById('targetWeightDisplay').innerText = `${convP(targetWeightKG)} ${unitMode}`;
        document.getElementById('visceralFat').innerText = p.grasaVisceral || "--";
        document.getElementById('muscleMass').innerText = `${convP(masaMagra)} ${unitMode}`;
        
        const ffmi = masaMagra / Math.pow(p.altura/100, 2);
        document.getElementById('displayFFMI').innerText = ffmi.toFixed(1);

        initChart(p, targetWeightKG);
        document.getElementById('modalDetalle').classList.remove('hidden');
    }

    function initChart(p, targetKG) {
        const ctx = document.getElementById('progressChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();

        const pesoInicial = parseFloat(p.peso);
        const metaData = [convP(pesoInicial)];
        const step = unitMode === 'KG' ? 0.45 : 1.0; 

        for(let i=1; i<10; i++) {
            let nextVal = parseFloat(metaData[i-1]) - step;
            metaData.push(nextVal.toFixed(1));
        }

        // UNIFICACIÓN RAÍZ: La serie real debe incluir el peso de registro en S1
        const realData = [convP(pesoInicial)];
        if(p.avances) {
            p.avances.forEach(a => realData.push(convP(a.peso)));
        }

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['S1','S2','S3','S4','S5','S6','S7','S8','S9','S10'],
                datasets: [
                    { label: 'Real', data: realData, borderColor: '#2563eb', tension: 0.3, borderWidth: 4, pointRadius: 6, backgroundColor: '#2563eb' },
                    { label: 'Meta', data: metaData, borderColor: '#e2e8f0', borderDash: [5,5], tension: 0, pointRadius: 0 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function toggleUnits(e) {
        e.preventDefault();
        e.stopPropagation();
        unitMode = unitMode === 'KG' ? 'LB' : 'KG';
        document.getElementById('currentUnitText').innerText = unitMode + " / " + (unitMode === 'KG' ? 'CM' : 'IN');
        renderTable(globalData);
        if(currentPatient) selectPatient(currentPatient);
    }

    async function saveNewClient() {
        const pesoRaw = parseFloat(document.getElementById('newWeight').value);
        let pKG = unitMode === 'LB' ? pesoRaw / 2.20462 : pesoRaw;
        
        const cliente = {
            id: document.getElementById('newID').value,
            nombre: document.getElementById('newName').value,
            sexo: document.getElementById('newGender').value,
            edad: document.getElementById('newAge').value,
            altura: document.getElementById('newHeight').value,
            peso: pKG.toFixed(2),
            grasa: document.getElementById('newFat').value,
            fechaInicio: new Date().toISOString()
        };

        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "guardarCliente", cliente }) });
        closeNewClientModal();
        fetchData();
    }

    function openNewClientModal() { document.getElementById('modalNuevo').classList.remove('hidden'); }
    function closeNewClientModal() { document.getElementById('modalNuevo').classList.add('hidden'); }
    function closeModal() { document.getElementById('modalDetalle').classList.add('hidden'); }
    window.onload = fetchData;
</script>
</body>
</html>
